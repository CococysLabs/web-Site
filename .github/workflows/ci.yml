name: CI — Continuous Integration

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, 'feature/**', 'hotfix/**', 'release/**']
  workflow_call:   # permite ser llamado desde deploy-*.yml

jobs:
  # ─────────────────────────────────────────────────────────────
  # Frontend: lint + build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # Backend: instalar deps + verificar imports
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend — Deps & Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify backend imports
        run: python -c "import app.main; print('✅ Backend imports OK')"
        env:
          DATABASE_URL: postgresql+psycopg://ci:ci@localhost/ci
          SECRET_KEY: ci-secret-key-not-used-in-production
          GEMINI_API_KEY: ci-placeholder
          GOOGLE_CREDENTIALS_FILE: ""

  # ─────────────────────────────────────────────────────────────
  # Docker: verificar que las imágenes compilan
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: cococys/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: cococys/frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
