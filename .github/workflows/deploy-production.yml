name: CD — Deploy Production

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Trigger Render Production Deploy
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: production
      url: ${{ vars.PROD_URL }}

    steps:
      - name: Trigger backend deploy hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger frontend deploy hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"

      - name: Summary
        run: |
          echo "## 🚀 Production deploy triggered" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ vars.PROD_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
