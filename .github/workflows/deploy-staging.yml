name: CD — Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deployment
  cancel-in-progress: true

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Trigger Render Staging Deploy
    runs-on: ubuntu-latest
    needs: ci
    # Requiere secret RENDER_STAGING_DEPLOY_HOOK configurado en el repo
    if: vars.DEPLOY_ENABLED == 'true'

    steps:
      - name: Trigger deploy hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"

      - name: Summary
        run: |
          echo "## ✅ Staging deploy triggered" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`develop\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
